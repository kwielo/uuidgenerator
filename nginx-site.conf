server {
    listen      80;
    listen      [::]:80;

    root /var/www/html/public;
    index index.php;

    server_name _;

    sendfile off;

    # Log to stdout/stderr so logs are visible via `docker logs`.
    error_log /dev/stderr info;
    access_log /dev/stdout;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://stats25.mydevil.net; connect-src 'self' https://stats25.mydevil.net" always;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        internal;
    }

    # Static assets: cache and serve directly.
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|webp|tiff|ttf|svg)$ {
        expires 5d;
        access_log off;
    }

    # Deny access to dotfiles (e.g. .git, .env), allow ACME challenges.
    location ~ /\.(?!well-known) {
        log_not_found off;
        deny all;
    }
}
